<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Potato | Video Game Compressor</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="authModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal" id="closeModal">&times;</span>
            <h2 id="modalTitle">Sign Up</h2>
            <div id="auth-form">
                <input type="text" id="username" placeholder="Username" required>
                <div id="nameSuggestions" class="suggestions hidden"></div>
                <input type="email" id="email" placeholder="Email Address" required>
                <input type="password" id="password" placeholder="Password (min 6 chars)" required>
                <button id="signup-btn" class="btn-ignite">Create Account</button>
                <p id="status-msg"></p>
            </div>
        </div>
    </div>

    <nav class="top-nav">
        <div id="loggedOutNav">
            <span class="nav-link white-to-orange" id="openSignup">SIGN UP</span>
            <span class="nav-separator">|</span>
            <span class="nav-link orange-to-white" id="openLogin">LOG IN</span>
        </div>
        <div id="loggedInNav" class="hidden">
            <span id="userDisplay" class="user-tag"></span>
            <span class="nav-link orange-to-white" id="signOutBtn">LOGOUT</span>
        </div>
    </nav>

    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <button class="toggle-sidebar" id="toggleSidebar">▶</button>
            <div class="sidebar-content" id="sidebarContent">
                <h2 class="side-title">COMMAND CENTER</h2>
                <nav class="sidebar-nav">
                    <div class="nav-item active" data-page="lab">COMPRESSOR</div>
                    <div class="nav-item" data-page="history">LIBRARY</div>
                    <div class="nav-item" data-page="community">COMMUNITY HUB</div>
                </nav>
            </div>
        </aside>

        <main class="main-content" id="mainContent">
            <div id="labPage" class="content-page lab-centered">
                <div class="potato-chamber">
                    <div id="potato" class="electric-potato">🥔</div>
                    <div id="benchmarkBarContainer" class="hidden">
                        <div id="benchmarkBar"></div>
                    </div>
                    <p id="statusText" class="status-msg">READY FOR INPUT</p>
                </div>
                
                <h1 class="main-title">HOT<span>POTATO</span></h1>
                <p class="main-subheading">VIDEO GAME COMPRESSOR</p>
                
                <section class="tool-card original-engine">
                    <div class="drop-zone" id="dropZone">
                        <input type="file" id="fileInput" style="display:none;">
                        <div class="dz-icon">📁</div>
                        <p id="fileLabel"><strong>DRAG GAME HERE</strong><br><span>to begin optimization</span></p>
                    </div>

                    <div class="system-options-grid">
                        <div class="field"><label>PC Model</label><input type="text" id="pcType" placeholder="RTX 4080"></div>
                        <div class="field"><label>Storage (GB)</label><input type="number" id="storageInput" value="" placeholder=""></div>
                        <div class="field">
                            <label>Focus</label>
                            <select id="optFocus">
                                <option value="quality">Quality</option>
                                <option value="perf">Performance</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>Level</label>
                            <select id="compLevel">
                                <option value="0.30">Balance (30%)</option>
                                <option value="0.85">Potato (85%)</option>
                            </select>
                        </div>
                    </div>
                    <button id="igniteBtn" class="btn-ignite">IGNITE COMPRESSION</button>
                </section>
            </div>

            <div id="historyPage" class="content-page hidden">
                <div class="dashed-grid" id="historyGrid"></div>
            </div>

            <div id="communityPage" class="content-page hidden">
                <div id="forumFeed" class="steam-feed"></div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
