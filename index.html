<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hot Potato | Universal Asset Lab</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>🖥️ STATION PROFILE</h3>
            </div>
            <div class="profile-inputs">
                <div class="field">
                    <label>PC Model</label>
                    <input type="text" id="pcModel" placeholder="e.g. Optiplex 7010">
                </div>
                <div class="field">
                    <label>RAM (GB)</label>
                    <input type="number" id="ramInput" placeholder="4">
                </div>
                <button id="runBenchmark" class="btn-benchmark">⚡ Run Hardware Test</button>
            </div>
            <div class="log-box">
                <h4>OPTIMIZATION LOG</h4>
                <div id="hwLog" class="hw-log"><p class="dim">> System Idle...</p></div>
            </div>
            <div class="recommendation-box">
                <h4>SUGGESTED MODE</h4>
                <div id="suggestedLevel" class="level-badge">---</div>
            </div>
        </aside>

        <main class="main-lab">
            <header class="engine-header">
                <div class="potato-chamber">
                    <div class="electric-potato">🥔</div>
                    <div class="energy-ring"></div>
                </div>
                <h1>HOT<span>POTATO</span></h1>
            </header>

            <section class="tool-card">
                <div class="drop-zone" id="dropZone">
                    <input type="file" id="fileInput" style="display:none;">
                    <div class="dz-content">
                        <span class="dz-icon">📥</span>
                        <p id="fileLabel"><strong>DRAG GAME HERE</strong><br>or click to browse</p>
                    </div>
                </div>
                
                <div id="progressArea" class="log-container hidden">
                    <div class="progress-bar"><div id="progressFill" class="fill"></div></div>
                    <div id="statusLog" class="status-log"></div>
                </div>

                <button id="igniteBtn" class="btn-ignite">IGNITE COMPRESSION</button>
            </section>

            <div class="library-header">
                <h3>Library</h3>
                <button id="clearLib" class="btn-clear">Wipe Data</button>
            </div>
            <div id="gameGrid" class="grid-layout"></div>
        </main>
    </div>

    <div id="successModal" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="modal-header">⚡ COMPRESSION SUCCESS</div>
            <div class="modal-body">
                <p id="repName" class="file-highlight"></p>
                <p>The optimized package has been sent to your <strong>Downloads</strong> folder.</p>
            </div>
            <button id="closeModal" class="btn-reset">Return to Laboratory</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
