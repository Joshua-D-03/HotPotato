<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Potato | Video Game Compressor</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="authModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal" id="closeModal">&times;</span>
            <h2 id="modalTitle">JOIN THE PATCH</h2>
            <div id="auth-form">
                <input type="text" id="username" placeholder="Username">
                <input type="email" id="email" placeholder="Email Address" required>
                <input type="password" id="password" placeholder="Password" required>
                <button id="authSubmitBtn" class="btn-ignite">CREATE ACCOUNT</button>
                <p id="status-msg" style="font-size: 0.8rem; margin-top: 10px; color: var(--orange);"></p>
                <p id="toggleAuthMode" style="cursor:pointer; font-size: 0.7rem; margin-top: 15px; color: #66c0f4;">Already have an account? Log In</p>
            </div>
        </div>
    </div>

    <nav class="top-nav">
        <div id="loggedOutNav">
            <span class="nav-link white-hover" id="openSignup">SIGN UP</span>
            <span class="nav-separator">|</span>
            <span class="nav-link white-hover" id="openLogin">LOG IN</span>
        </div>
        <div id="loggedInNav" class="hidden">
            <span id="userDisplay" class="user-tag"></span>
            <span class="nav-link orange-hover" id="logoutBtn">LOGOUT</span>
        </div>
    </nav>

    <div class="sidebar" id="sidebar">
        <button class="toggle-sidebar" id="toggleSidebar">◀</button>
        <div class="nav-item active" data-page="compressor">COMPRESSOR</div>
        <div class="nav-item" data-page="history">VAULT</div>
        <div class="nav-item" data-page="community">COMMUNITY</div>
    </div>

    <div class="main-content">
        <main>
            <div id="compressorPage" class="content-page">
                <section class="compressor-container">
                    <h2 class="section-title">&nbsp;&nbsp;&nbsp;COMMAND CENTER</h2>
                    
                    <div class="drop-zone" id="dropZone">
                        <div class="potato-orb blue-aura" id="potato"></div>
                        <p id="fileLabel">DROP GAME EXECUTABLE HERE<br><small>OR CLICK TO BROWSE</small></p>
                        <input type="file" id="fileInput" hidden>
                        
                        <div id="progressContainer" class="progress-wrapper hidden">
                            <div class="progress-bar-bg">
                                <div id="progressBar" class="progress-fill"></div>
                            </div>
                            <p id="percentText">0%</p>
                        </div>
                    </div>

                    <div class="controls-grid">
                        <div class="input-group">
                            <label>TARGET HARDWARE</label>
                            <input type="text" id="pcType" placeholder="Scanning..." readonly>
                        </div>
                        <div class="input-group">
                            <label>COMPRESSION LEVEL</label>
                            <select id="compLevel">
                                <option value="0.30">Balanced (30%)</option>
                                <option value="0.65">Extreme (65%)</option>
                                <option value="0.85">Potato (85%)</option>
                            </select>
                        </div>
                    </div>
                    <button id="igniteBtn" class="btn-ignite">IGNITE COMPRESSION</button>
                </section>
            </div>

            <div id="historyPage" class="content-page hidden">
                <h2 class="section-title">VAULT</h2>
                <div class="dashed-grid" id="historyGrid"></div>
            </div>

            <div id="communityPage" class="content-page hidden">
                <div class="nexus-container">
                    <div class="nexus-header">
                        <div class="community-top-row">
                            <h2>MODS & DISCUSSIONS</h2>
                            <input type="text" id="discussionSearch" placeholder="Search discussions...">
                        </div>
                        <button id="newPostBtn" class="btn-ignite" style="width: auto; padding: 10px 20px; font-size: 0.8rem; margin-top:10px;">NEW DISCUSSION</button>
                    </div>
                    <table class="nexus-table" id="nexusTable">
                        <thead>
                            <tr><th>Topic</th><th>Category</th><th>Author</th><th>Replies</th></tr>
                        </thead>
                        <tbody id="discussionBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="discussionModal" class="modal hidden">
        <div class="modal-content steam-thread">
            <span class="close-modal" id="closeThread">&times;</span>
            <div id="threadContent"></div>
            <div id="replySection" class="thread-reply-box hidden">
                <textarea id="replyText" placeholder="Write a comment..."></textarea>
                <button id="postReplyBtn" class="btn-ignite" style="width:120px; padding:10px;">POST</button>
            </div>
            <div id="loginToReplyMsg" class="thread-reply-box" style="text-align: center; border: 1px dashed #333; padding: 20px;">
                <p style="color: #8ba2b9;">You must be <span class="orange-hover" onclick="document.getElementById('openLogin').click()">Logged In</span> to reply to this discussion.</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
