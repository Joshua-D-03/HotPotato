<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Potato | AI-Driven Hardware Compressor</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <nav class="top-nav">
        <div id="loggedOutNav">
            <span class="nav-link white-to-orange" onclick="openAuth('signup')">SIGN UP</span>
            <span class="nav-separator">|</span>
            <span class="nav-link orange-to-white" onclick="openAuth('login')">LOG IN</span>
        </div>
        <div id="loggedInNav" class="hidden">
            <span id="userDisplay" class="user-tag"></span>
            <span class="nav-link orange-to-white" id="signOutBtn">LOGOUT</span>
        </div>
    </nav>

    <div class="app-container">
        <aside class="sidebar closed" id="sidebar">
            <button class="toggle-sidebar" id="toggleSidebar">▶</button>
            <div class="sidebar-content">
                <h2 class="side-title">COMMAND CENTER</h2>
                <nav class="sidebar-nav">
                    <div class="nav-item active" data-page="lab">COMPRESSOR</div>
                    <div class="nav-item" data-page="history">LIBRARY & HISTORY</div>
                    <div class="nav-item" data-page="community">COMMUNITY HUB</div>
                </nav>
            </div>
        </aside>

        <main class="main-content">
            <div id="labPage" class="content-page lab-centered">
                <header class="engine-header-stacked">
                    <div class="potato-chamber">
                        <div id="potato" class="electric-potato">🥔</div>
                        <div id="benchmarkBarContainer" class="hidden">
                            <div id="benchmarkBar"></div>
                        </div>
                        <p id="statusText" class="status-msg">NEURAL LINK READY</p>
                    </div>
                    <h1 class="main-title">HOT<span>POTATO</span></h1>
                    <p class="main-subheading">AI Hardware Analysis Engine</p>
                </header>
                
                <section class="tool-card original-engine">
                    <div class="drop-zone" id="dropZone">
                        <input type="file" id="fileInput" style="display:none;">
                        <div class="dz-icon">📁</div>
                        <p id="fileLabel"><strong>INSERT GAME DATA</strong><br><span>or click to browse files</span></p>
                    </div>

                    <div class="system-options-grid">
                        <div class="field">
                            <label>PC Model (AI Deep Search)</label>
                            <input type="text" id="pcType" placeholder="e.g. RTX 4080, Steam Deck, GTX 1650">
                        </div>
                        <div class="field">
                            <label>Disk Capacity (GB)</label>
                            <input type="number" id="storageInput" min="1" value="500">
                        </div>
                        <div class="field">
                            <label>AI Recommended Focus</label>
                            <select id="optFocus">
                                <option value="quality">Image Quality</option>
                                <option value="performance">Performance</option>
                                <option value="balance" selected>Balanced Path</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>Compression Level</label>
                            <select id="compLevel">
                                <option value="0.15">Standard (15%)</option>
                                <option value="0.30">Balanced (30%)</option>
                                <option value="0.60">Extreme (60%)</option>
                                <option value="0.85">Potato Mode (85%)</option>
                            </select>
                        </div>
                    </div>
                    <button id="igniteBtn" class="btn-ignite">ANALYZE HARDWARE & IGNITE</button>
                </section>
            </div>

            <div id="historyPage" class="content-page hidden">
                <div class="library-scroll-container">
                    <div class="dashed-grid" id="historyGrid">
                        </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
